<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Grading System</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.png">
</head>
<body>
  <header class="app-header">
    <div class="header-content">
      <div class="header-top">
        <h1>Teacher Grading System</h1>
        <div class="nav-actions">
          <button id="navHomeBtn" class="btn btn-secondary">Classi</button>
          <button id="navTestsBtn" class="btn btn-secondary">Verifiche</button>
          <button id="navEvaluationBtn" class="btn btn-secondary">Valutazione</button>
          <!-- <button id="navConfigBtn" class="btn btn-secondary">Configurazione</button> -->
          <button id="resetBtn" class="btn btn-danger">Reset</button>
          <a href="https://paolafatigato.github.io/Class-Manager/" target="_blank" rel="noopener" id="backToClassroomManagerBtn" class="btn btn-classroom " style="text-decoration:none;display:inline-block;">ClassroomManager</a>
          <!-- Firebase Auth Button -->
          <div id="firebaseAuthArea" style="display:flex;align-items:center;gap:10px;">
            <button id="loginBtn" class="btn btn-primary" style="display:none;">🔑 Accedi con Google</button>
            <span id="userInfo" style="font-size:13px;opacity:0.85;display:none;"></span>
            <button id="logoutBtn" class="btn btn-secondary btn-small" style="display:none;">Esci</button>
          </div>
        </div>
      </div>
      <!-- Firebase status banner -->
      <div id="firebaseStatus" style="font-size:12px;opacity:0.8;"></div>
    </div>
  </header>

  <main class="container">
    <section id="homeView" class="panel view">
      <h2>Le tue classi <span id="firebaseBadge" style="font-size:13px;font-weight:400;color:#4a8f5f;display:none;">🔗 Firebase</span></h2>
      <div id="classList" class="card-grid"></div>
      <div class="panel-actions">
        <div class="field">
          <label for="newClassNameInput">Nuova classe (locale)</label>
          <input id="newClassNameInput" type="text" placeholder="e.g., 2A" />
        </div>
        <button id="addClassBtn" class="btn btn-primary">Aggiungi classe</button>
      </div>
    </section>

    <section id="classView" class="panel view">
      <div class="panel-header panel-header--actions">
        <h2>Classe</h2>
        <div class="panel-header-actions">
          <button id="backToHomeBtn" class="btn btn-secondary">Torna alle classi</button>
          <button id="deleteClassBtn" class="icon-btn" aria-label="Elimina classe">×</button>
        </div>
      </div>
      <div class="panel-actions">
        <div class="field">
          <label for="classSelect">Seleziona classe</label>
          <select id="classSelect"></select>
        </div>
        <div class="field">
          <label for="classRenameInput">Rinomina classe</label>
          <input id="classRenameInput" type="text" />
        </div>
        <button id="renameClassBtn" class="btn btn-secondary">Aggiorna nome</button>
      </div>
      <div class="panel-actions">
        <button id="addStudentBtn" class="btn btn-primary">Aggiungi studente</button>
      </div>
      <div class="bulk-students">
        <div class="field">
          <label for="bulkStudentsInput">Aggiungi studenti (nomi completi separati da virgole o righe)</label>
          <textarea id="bulkStudentsInput" rows="3" placeholder="Reina Allmeta,&#10;Barbara Atanasova,&#10;Aida Bance,"></textarea>
        </div>
        <button id="addBulkStudentsBtn" class="btn btn-secondary">Aggiungi studenti</button>
      </div>
      <div class="table-wrapper">
        <table id="classStudentsTable" class="grade-table"></table>
      </div>
    </section>

    <section id="testsView" class="panel view">
      <div class="panel-header">
        <h2>Verifiche</h2>
        <button id="addTestBtn" class="btn btn-primary">+ Nuova verifica</button>
      </div>
      <div id="testsList" class="card-grid"></div>
    </section>

    <!-- Dialog per nuova verifica -->
    <dialog id="newTestDialog">
      <form method="dialog" id="newTestForm">
        <h3>Nuova verifica</h3>
        <div class="field">
          <label for="newTestNameInput">Nome verifica</label>
          <input id="newTestNameInput" name="newTestNameInput" type="text" placeholder="Nome della verifica" required />
        </div>
        <div class="field">
          <label for="newTestSubjectInput">Materia</label>
          <input id="newTestSubjectInput" name="newTestSubjectInput" type="text" placeholder="Materia" required />
        </div>
        <menu>
          <button id="cancelNewTestBtn" type="reset">Annulla</button>
          <button id="confirmNewTestBtn" type="submit" class="btn btn-primary">Crea</button>
        </menu>
      </form>
    </dialog>

    <section id="testView" class="panel view">
      <div class="panel-header">
        <h2>Valutazione</h2>
        <div class="panel-actions">
          <div class="field">
            <label for="testClassSelect">Classe</label>
            <select id="testClassSelect"></select>
          </div>
          <div class="field">
            <label for="testSelect">Verifica</label>
            <select id="testSelect"></select>
          </div>
          <div class="field">
            <label for="testVersionSelect">Versione</label>
            <select id="testVersionSelect"></select>
          </div>
          <button id="exportBtn" class="btn btn-secondary">Export CSV</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="gradeTable" class="grade-table"></table>
      </div>
      <div id="warningArea" class="warning-area"></div>
    </section>

  </main>

  <!-- Dialog commento cella -->
  <dialog id="commentDialog">
    <div class="comment-dialog-inner">
      <h3>Commento</h3>
      <textarea id="commentTextarea" rows="4" placeholder="Scrivi un commento per questa cella…"></textarea>
      <div class="comment-dialog-actions">
        <button id="commentCancelBtn" class="btn btn-secondary">Annulla</button>
        <button id="commentDeleteBtn" class="btn btn-danger">Elimina</button>
        <button id="commentSaveBtn" class="btn btn-primary">Salva</button>
      </div>
    </div>
  </dialog>

  <footer class="app-footer">
    <span>Voti salvati localmente. Classi sincronizzate da Firebase.</span>
  </footer>

  <template id="sectionTemplate">
    <div class="section-card" draggable="true">
      <div class="section-drag-handle">⋮⋮</div>
      <button class="icon-btn remove-section" aria-label="Elimina sezione">×</button>
      <div class="section-header">
        <div class="field">
          <label>Section Name</label>
          <input type="text" class="section-name" placeholder="e.g., Grammar" />
        </div>
        <div class="section-actions">
          <button class="btn btn-secondary add-subsection">Add Subsection</button>
        </div>
      </div>
      <div class="subsections"></div>
    </div>
  </template>

  <template id="subsectionTemplate">
    <div class="subsection-row">
      <div class="field">
        <label>Subsection Name</label>
        <input type="text" class="subsection-name" placeholder="e.g., Exercise 1" />
      </div>
      <div class="field small">
        <label>Weight</label>
        <input type="number" class="subsection-weight" min="0" step="0.1" />
      </div>
      <div class="field small">
        <label>Max Score</label>
        <input type="number" class="subsection-max" min="0" step="0.1" />
      </div>
      <button class="btn btn-danger remove-subsection">Remove</button>
    </div>
  </template>

  <!-- Firebase Compat SDK (v9 compat = v8 API, works with regular scripts) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <script src="app.js"></script>
</html>
